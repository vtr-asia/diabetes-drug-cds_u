<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臺灣50優良SMART on FHIR 應用程式徵案</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
  <style>
    /* 原有樣式保持不變（為節省空間，此處省略，可直接複製您原本的 <style> 內容） */
    /* ...（請保留您原本的全部 CSS）... */
  </style>
</head>
<body>

<div class="launch-container">
  <!-- 原有 hero、features、footer 保持不變 -->
  <div class="hero">
    <h1 class="logo">SMART on FHIR</h1>
    <p class="tagline">臺灣50優良SMART on FHIR 應用程式徵案</p>
    <p class="subtitle">
      SMART App Submission Briefing & Workshop<br>
      主辦單位：衛生福利部資訊處<br>
      透過SMART on FHIR的導入，加值FHIR生態系之應用
    </p>
    <a href="#" id="launch-button" class="btn-start">進入系統 →</a>
  </div>

  <!-- features 與 footer 保持原樣 -->
  <div class="features">...</div>
  <div class="footer">...</div>
</div>

<script>
  document.getElementById('launch-button').addEventListener('click', function(e) {
    e.preventDefault();

    console.log("🚀 開始 SMART on FHIR OAuth2 授權流程（第二階段測試）...");

    // 第二階段測試常用參數調整
    FHIR.oauth2.authorize({
      client_id: "cc344727-6f90-496c-94fd-c7829aa9a51d",   // 您的 Client ID（第二階段若有更新請替換）

      // 重要：FHIR Server 的 Issuer / Base URL（aud）
      // 請根據 MOHW 測試環境替換成正確值，常見如：
      // "https://fhir.mohw.gov.tw/..." 或 sandbox 提供的 iss
      aud: "https://your-fhir-server-base-url/fhir",   // ←←← 務必修改成正確的 FHIR Server URL

      // Scope（建議包含這些以通過第二階段驗證）
      scope: "launch launch/patient patient/*.read openid fhirUser profile offline_access",

      // 重新導向（相對於目前頁面）
      redirect_uri: window.location.origin + "/index.html",   // 或直接寫 "index.html" 若同目錄

      // 可選但推薦：state 防 CSRF
      state: "medsafety-cds-" + Date.now(),

      // 其他常見參數（視測試環境需求可增加）
      // response_type: "code"   // fhirclient 預設會處理
    }).catch(function(error) {
      console.error("❌ OAuth 授權失敗：", error);
      alert("授權啟動失敗，請檢查 console 錯誤訊息與 aud / client_id 是否正確。");
    });
  });
</script>

</body>
</html>
