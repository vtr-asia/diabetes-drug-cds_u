<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糖尿病用藥決策支援系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface-2: #f1f5f9;
    --border: #e2e8f0;
    --text-primary: #0f172a;
    --accent-blue: #1e40af;
    --accent-teal: #0f766e;
    --accent-red: #b91c1c;
    --accent-amber: #b45309;
    --accent-green: #15803d;
    --nav-bg: #0f172a;
    --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
    --card-shadow-hover: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .fade-in { animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .spinner {
    width: 52px; height: 52px;
    border: 4px solid #e2e8f0;
    border-top-color: var(--accent-teal);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .nav-bar {
    background: var(--nav-bg);
    position: sticky; top: 0; z-index: 50;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
  }

  .patient-card {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    overflow: hidden;
  }
  .patient-card-banner {
    height: 8px;
    background: linear-gradient(90deg, #1e40af, #0f766e, #15803d);
  }

  .metric-card, .med-card, .card {
    background: var(--surface);
    border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .metric-card:hover, .med-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--card-shadow-hover);
  }

  .cds-panel {
    background: linear-gradient(145deg, #0f172a, #1e2937);
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(15,23,42,0.25);
  }

  .med-item {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    transition: all 0.2s;
  }
  .med-item:hover {
    background: #f1f5f9;
    border-color: #0f766e;
  }

  .value-display {
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    line-height: 1;
  }

  .status-dot.live {
    background: #4ade80;
    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.7); }
    70% { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }
</style>
</head>

<body>

<nav class="nav-bar">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-teal-600 to-blue-700 flex items-center justify-center flex-shrink-0 shadow-lg">
        <i class="fa-solid fa-pills text-white text-xl"></i>
      </div>
      <div>
        <span class="text-white font-bold text-xl tracking-tight">糖尿病用藥決策支援系統</span>
        <p class="text-teal-300 text-xs font-mono tracking-widest -mt-0.5">SMART on FHIR R4 • CDS</p>
      </div>
    </div>
    <div class="flex items-center gap-3 text-xs text-slate-400">
      <span class="status-dot live inline-block"></span>
      <span class="font-mono">即時用藥決策支援</span>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto py-8 px-4 sm:px-6">

  <!-- 載入中 -->
  <div id="loading" class="flex flex-col items-center justify-center py-32 gap-6">
    <div class="spinner"></div>
    <div class="text-center">
      <p class="text-slate-700 font-semibold">正在連接 FHIR 沙盒...</p>
      <p class="mt-1 text-sm text-slate-400 font-mono" id="loading-detail">初始化用藥決策引擎</p>
    </div>
  </div>

  <!-- 錯誤 -->
  <div id="error-box" class="hidden max-w-lg mx-auto mt-20 p-10 text-center rounded-3xl bg-red-50 border border-red-200">
    <div class="w-16 h-16 rounded-2xl bg-red-100 flex items-center justify-center mx-auto mb-6">
      <i class="fa-solid fa-circle-exclamation text-4xl text-red-600"></i>
    </div>
    <h2 class="text-2xl font-bold text-red-800 mb-3">資料讀取失敗</h2>
    <p id="error-msg" class="text-red-700"></p>
    <a href="https://launch.smarthealthit.org/" target="_blank" 
       class="mt-8 inline-flex items-center gap-3 px-8 py-4 bg-red-600 hover:bg-red-700 text-white rounded-2xl text-sm font-semibold transition-all">
      返回 SMART Launcher 重新授權
    </a>
  </div>

  <!-- 主要內容 -->
  <div id="content" class="hidden">

    <!-- 病人卡片 -->
    <div class="patient-card mb-8 fade-in stagger-1">
      <div class="patient-card-banner"></div>
      <div class="p-7 flex flex-wrap items-center gap-6">
        <div id="avatar-box" class="w-20 h-20 rounded-3xl flex items-center justify-center text-white text-4xl bg-gradient-to-br from-blue-600 to-teal-600 shadow-xl flex-shrink-0">
          <i class="fa-solid fa-user"></i>
        </div>
        <div class="flex-1 min-w-0">
          <h1 class="text-3xl font-bold text-slate-900 truncate" id="ui-name">讀取中...</h1>
          <div class="flex flex-wrap gap-4 mt-3">
            <span class="badge bg-blue-50 text-blue-700 border border-blue-200">
              <i class="fa-solid fa-fingerprint"></i> <span id="ui-id" class="font-mono"></span>
            </span>
            <span class="badge bg-slate-100 text-slate-700 border border-slate-200" id="ui-gender-badge"></span>
            <span class="badge bg-slate-100 text-slate-700 border border-slate-200"><span id="ui-age"></span> 歲</span>
            <span class="badge bg-slate-100 text-slate-700 border border-slate-200" id="ui-dob"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

      <!-- 左欄 -->
      <div class="lg:col-span-8 space-y-8">
        <!-- 指標卡片 + 趨勢圖 + 近期檢驗（保持不變，程式碼較長故省略，可複製上一版） -->
        <!-- ... HbA1c、眼底、足部、趨勢圖、近期檢驗 ... -->
      </div>

      <!-- 右欄 ── 新增目前用藥清單 -->
      <div class="lg:col-span-4 space-y-8">

        <!-- 目前用藥清單（新增區塊） -->
        <div class="card p-7 fade-in stagger-1" id="medication-section">
          <div class="flex items-center justify-between mb-5">
            <h3 class="font-bold text-xl flex items-center gap-3">
              <i class="fa-solid fa-prescription-bottle-medical text-teal-600"></i>
              目前用藥清單
            </h3>
            <span class="text-xs bg-teal-100 text-teal-700 px-3 py-1 rounded-full font-medium">最新紀錄</span>
          </div>
          <div id="current-medications" class="space-y-3">
            <!-- 動態插入用藥項目 -->
          </div>
        </div>

        <!-- CDS 用藥決策面板 -->
        <div class="cds-panel p-8 text-white fade-in stagger-2">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-9 h-9 rounded-2xl bg-white/10 flex items-center justify-center">
              <i class="fa-solid fa-brain text-teal-300"></i>
            </div>
            <div>
              <div class="uppercase text-teal-300 text-xs font-bold tracking-widest">Clinical Decision Support</div>
              <div class="text-lg font-semibold">用藥決策建議</div>
            </div>
          </div>
          <div id="ui-suggestions" class="space-y-4"></div>
        </div>

        <!-- 衛教專區 -->
        <div class="card p-8 fade-in stagger-3">
          <div class="flex items-center gap-3 mb-6">
            <i class="fa-solid fa-book-medical text-teal-600 text-2xl"></i>
            <h3 class="font-bold text-xl text-teal-800">用藥衛教專區</h3>
          </div>
          <div id="education-content" class="space-y-4 text-sm"></div>
          <button onclick="showEducationModal()" 
                  class="mt-7 w-full bg-teal-600 hover:bg-teal-700 text-white py-4 rounded-2xl font-semibold flex items-center justify-center gap-2 transition-all active:scale-95">
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
            查看完整衛教資源庫
          </button>
        </div>

      </div>
    </div>
  </div>
</main>

<!-- 衛教 Modal（請保留您原本的完整 Modal 內容） -->
<!-- ... education-modal ... -->

<script>
// ==================== 新增：讀取目前用藥清單 ====================
async function loadCurrentMedications(client) {
  const container = document.getElementById('current-medications');
  container.innerHTML = `<p class="text-slate-400 text-sm py-8 text-center">載入用藥資料中...</p>`;

  try {
    // 優先查 MedicationStatement（正在使用的藥）
    let bundle = await client.request('MedicationStatement?patient=Patient/' + client.patient.id + '&status=active&_sort=-effective&_count=10', { flat: false });

    let meds = (bundle?.entry || []).map(e => e.resource).filter(Boolean);

    // 若無資料，改查 MedicationRequest
    if (meds.length === 0) {
      bundle = await client.request('MedicationRequest?patient=Patient/' + client.patient.id + '&status=active&_sort=-authoredOn&_count=10', { flat: false });
      meds = (bundle?.entry || []).map(e => e.resource).filter(Boolean);
    }

    if (meds.length === 0) {
      container.innerHTML = `
        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-6 text-center">
          <i class="fa-solid fa-prescription-bottle text-3xl text-amber-500 mb-3"></i>
          <p class="text-amber-700 font-medium">目前沙盒中無用藥紀錄</p>
          <p class="text-amber-600 text-xs mt-1">可手動新增或確認 FHIR 資源是否已上傳</p>
        </div>`;
      return;
    }

    const html = meds.map(med => {
      const medName = med.medicationCodeableConcept?.text ||
                      med.medicationCodeableConcept?.coding?.[0]?.display ||
                      '未知藥品';

      const dosage = med.dosage?.[0]?.text || 
                     (med.dosage?.[0]?.doseAndRate?.[0]?.doseQuantity ? 
                      `${med.dosage[0].doseAndRate[0].doseQuantity.value} ${med.dosage[0].doseAndRate[0].doseQuantity.unit || ''}` : '');

      const frequency = med.dosage?.[0]?.timing?.code?.text || '每日';

      const status = med.status === 'active' ? 
        '<span class="inline-flex items-center gap-1 text-emerald-600 text-xs"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>使用中</span>' : 
        '<span class="text-slate-400 text-xs">已停用</span>';

      return `
        <div class="med-item p-5 flex gap-4">
          <div class="w-10 h-10 bg-teal-100 text-teal-700 rounded-2xl flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-capsules text-lg"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-semibold text-slate-800 leading-tight">${medName}</div>
            ${dosage ? `<div class="text-sm text-slate-600 mt-1">${dosage}　${frequency}</div>` : ''}
            <div class="mt-3">${status}</div>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = html;

  } catch (err) {
    console.error(err);
    container.innerHTML = `<p class="text-red-500 text-sm">用藥資料讀取失敗</p>`;
  }
}

// ==================== 更新 CDS（結合用藥清單） ====================
function updateCDS(hba1c) {
  const container = document.getElementById('ui-suggestions');
  let suggestions = [];

  if (hba1c === null) {
    suggestions.push({icon: 'fa-circle-info', color: 'text-slate-400', text: '尚未取得最新 HbA1c 資料，建議優先補齊檢驗。'});
  } else if (hba1c > 8.5) {
    suggestions.push({icon: 'fa-triangle-exclamation', color: 'text-red-400', text: `HbA1c ${hba1c.toFixed(1)}% ─ 嚴重高血糖，建議立即評估加強胰島素或新增 SGLT2i / GLP-1 RA。`});
  } else if (hba1c > 7.5) {
    suggestions.push({icon: 'fa-chart-line', color: 'text-amber-400', text: `HbA1c ${hba1c.toFixed(1)}% ─ 高於目標，建議優化目前口服藥物劑量。`});
  } else {
    suggestions.push({icon: 'fa-circle-check', color: 'text-emerald-400', text: `HbA1c ${hba1c.toFixed(1)}% ─ 控制良好，維持現有治療計畫。`});
  }

  suggestions.push({icon: 'fa-clock', color: 'text-teal-300', text: '確認用藥依從性與是否有低血糖事件'});
  suggestions.push({icon: 'fa-heart-pulse', color: 'text-blue-300', text: '具心腎保護適應症者，可優先考慮 SGLT2i 或 GLP-1 RA'});

  container.innerHTML = suggestions.map(s => `
    <div class="flex gap-4 bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-5">
      <i class="fa-solid ${s.icon} ${s.color} mt-1 text-xl flex-shrink-0"></i>
      <p class="text-slate-200 leading-relaxed">${s.text}</p>
    </div>
  `).join('');
}

// ==================== initApp（新增呼叫 loadCurrentMedications） ====================
async function initApp() {
  try {
    setLoading('連接 FHIR Client...');
    const client = await FHIR.oauth2.ready();

    setLoading('讀取病人基本資料...');
    const patient = await client.patient.read();

    // ...（原有病人資料顯示、HbA1c、眼底、足部、趨勢圖、檢驗列表等程式碼保持不變）...

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');

    // 新增：載入目前用藥清單
    setLoading('載入目前用藥清單...');
    await loadCurrentMedications(client);

    // ...（其餘原有功能：updateEducationSection、updateCDS、updateChart 等）...

  } catch (err) {
    console.error(err);
    showError(`讀取失敗：${err.message || err}`);
  }
}

window.onload = initApp;
</script>
</body>
</html>
