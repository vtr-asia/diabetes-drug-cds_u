<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FHIR MedSafety CDS Pro - 糖尿病藥物安全決策支援</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #0f172a;
      --accent: #2563eb;
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #10b981;
      --bg: #f8fafc;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      margin: 0;
      color: #1e293b;
      line-height: 1.6;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar { 
      background: var(--brand); 
      color: white; 
      padding: 30px 20px; 
      position: sticky; 
      top: 0; 
      height: 100vh; 
    }
    .main-content { padding: 40px; overflow-y: auto; }

    .card { 
      background: var(--card); 
      border-radius: 16px; 
      padding: 24px; 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
      border: 1px solid #e2e8f0;
      animation: fadeInUp 0.5s ease-out forwards;
    }

    .view { display: none; }
    .view.active { display: block; }

    .metric-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 20px; 
      margin-bottom: 30px; 
    }
    .metric-card { 
      padding: 24px 20px; 
      border-radius: 12px; 
      background: #fff; 
      border-bottom: 5px solid #e2e8f0; 
      text-align: center;
    }
    .metric-card.alert { border-bottom-color: var(--danger); animation: pulse 2s infinite; }
    .metric-card.warn { border-bottom-color: var(--warning); }
    .metric-value { 
      font-size: 2.8rem; 
      font-weight: 700; 
      margin: 8px 0; 
      color: #1e293b;
    }
    .metric-label { 
      font-size: 0.9rem; 
      font-weight: 600; 
      color: #64748b; 
      text-transform: uppercase; 
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .cds-item { 
      padding: 18px; 
      border-radius: 12px; 
      margin-bottom: 14px; 
      border-left: 6px solid #cbd5e0; 
      background: #f8fafc; 
    }
    .cds-critical { border-left-color: var(--danger); background: #fef2f2; color: #991b1b; }
    .cds-warning { border-left-color: var(--warning); background: #fffbeb; color: #92400e; }

    .btn-action { 
      width: 100%; 
      padding: 14px; 
      border-radius: 10px; 
      border: none; 
      background: var(--accent); 
      color: white; 
      font-weight: 600; 
      cursor: pointer; 
      margin-top: 12px; 
      font-size: 1rem;
    }
    .btn-action:hover { background: #1d4ed8; }

    .patient-selector-card { 
      cursor: pointer; 
      transition: all 0.3s; 
      border: 1px solid #e2e8f0; 
      padding: 20px;
    }
    .patient-selector-card:hover { 
      border-color: var(--accent); 
      transform: translateY(-4px); 
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15); 
    }

    #currentPatientInfo { 
      background: #ecfdf5; 
      padding: 16px 20px; 
      border-radius: 12px; 
      margin-bottom: 24px; 
      border-left: 6px solid #10b981; 
      font-weight: 600;
    }

    .debug { font-size: 0.82rem; color: #64748b; margin-top: 8px; }
  </style>
</head>
<body>

<div class="app-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2 style="color: #38bdf8; margin-bottom: 6px;">MedSafety CDS</h2>
    <p style="font-size: 0.85rem; opacity: 0.75;">糖尿病藥物安全決策支援<br>FHIR Server: THAS MOHW</p>
    <hr style="opacity: 0.25; margin: 25px 0;">
    <nav>
      <div style="padding: 12px 0; font-weight: 600; color: #38bdf8; cursor: pointer;" onclick="backToSelector()">
        ● 臨床監測首頁
      </div>
      <div style="padding: 12px 0; opacity: 0.6; cursor: pointer;">歷史用藥紀錄</div>
      <div style="padding: 12px 0; opacity: 0.6; cursor: pointer;">警示管理</div>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div id="currentPatientInfo">正在處理 SMART on FHIR 授權與病患資料...</div>

    <!-- 病患選擇器 -->
    <div id="selectorView" class="view">
      <h1 style="margin-bottom: 30px;">請選擇病患進行決策支援</h1>
      <div id="patientGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px;"></div>
    </div>

    <!-- 監測主畫面 -->
    <div id="monitoringView" class="view">
      <h1 id="patientName" style="margin-bottom: 8px;">病患監測</h1>
      <p id="patientIdDisplay" style="color: #64748b; margin-bottom: 30px; font-size: 1.05rem;"></p>

      <!-- 指標卡 -->
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-label">高風險藥物警示</div>
          <div id="highRiskCount" class="metric-value">2</div>
        </div>
        <div class="metric-card warn">
          <div class="metric-label">潛在藥物交互</div>
          <div id="interactionCount" class="metric-value">1</div>
        </div>
        <div class="metric-card alert">
          <div class="metric-label">過敏禁忌</div>
          <div id="allergyCount" class="metric-value">1</div>
        </div>
      </div>

      <!-- CDS 警示 -->
      <h2 style="margin: 35px 0 16px;">臨床決策支援警示</h2>
      <div id="cdsAlerts"></div>

      <!-- 圖表 -->
      <div class="card" style="margin-top: 40px;">
        <h3 style="margin-bottom: 18px;">近期血糖趨勢（mg/dL）</h3>
        <canvas id="glucoseChart" height="120"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
<script>
// 全域變數
let fhirClient = null;

// 初始化 SMART on FHIR
async function initializeSMART() {
  const infoDiv = document.getElementById("currentPatientInfo");

  try {
    infoDiv.textContent = "🔄 正在驗證授權並取得病患 context...";

    fhirClient = await FHIR.oauth2.ready();

    const patientId = fhirClient.patient?.id;
    const encounterId = fhirClient.encounter?.id;

    console.log("%c✅ SMART on FHIR 授權成功", "color: green; font-weight: bold");
    console.log("Patient ID:", patientId);
    console.log("Encounter ID:", encounterId);

    if (patientId) {
      infoDiv.innerHTML = `
        <strong>目前病患：</strong> ${patientId}
        ${encounterId ? `<br><strong>就醫紀錄：</strong> ${encounterId}` : ''}
      `;
      await loadMonitoringView(patientId);
    } else {
      infoDiv.innerHTML = "⚠️ 未取得特定病患，請手動選擇";
      showView("selectorView");
      loadPatientSelector();
    }

  } catch (error) {
    console.error("❌ SMART 初始化失敗:", error);
    infoDiv.innerHTML = `
      <span style="color: #ef4444;">
        授權失敗，請重新從 EHR 系統啟動本應用程式。<br>
        <small>${error.message || error}</small>
      </span>
    `;
    showView("selectorView");
  }
}

// 載入監測畫面
async function loadMonitoringView(patientId) {
  showView("monitoringView");

  try {
    const patient = await fhirClient.request(`Patient/${patientId}`);

    const patientName = patient.name?.[0]?.text || 
                       (patient.name?.[0]?.family + " " + (patient.name?.[0]?.given?.join(" ") || "")).trim() || 
                       "糖尿病病患";

    document.getElementById("patientName").textContent = patientName;
    document.getElementById("patientIdDisplay").innerHTML = `病患 ID: <strong>${patientId}</strong>`;

    generateSampleCDSAlerts();
    drawSampleChart();

  } catch (e) {
    console.error("載入病患資料失敗", e);
    document.getElementById("patientName").textContent = "病患資料載入失敗";
  }
}

// 產生範例警示
function generateSampleCDSAlerts() {
  const container = document.getElementById("cdsAlerts");
  container.innerHTML = `
    <div class="cds-item cds-critical">
      <strong>⚠️ 嚴重警示：</strong> 病人有 Metformin 過敏史，請避免開立任何含二甲雙胍成分之藥物。
    </div>
    <div class="cds-item cds-warning">
      <strong>藥物交互注意：</strong> 目前處方 SGLT2 抑制劑與胰島素併用，可能增加低血糖風險，建議調整劑量並加強血糖監測。
    </div>
    <div class="cds-item">
      <strong>臨床建議：</strong> 病人 HbA1c 控制不佳，可考慮新增 GLP-1 受體促效劑作為輔助治療。
    </div>
  `;
}

// 繪製血糖趨勢圖
function drawSampleChart() {
  const ctx = document.getElementById("glucoseChart").getContext("2d");
  
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['3/1', '3/8', '3/15', '3/22'],
      datasets: [{
        label: '空腹血糖 (mg/dL)',
        data: [152, 138, 161, 142],
        borderColor: '#2563eb',
        backgroundColor: 'rgba(37, 99, 235, 0.08)',
        tension: 0.4,
        borderWidth: 3,
        pointRadius: 5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top' }
      },
      scales: {
        y: { 
          min: 80, 
          max: 200,
          title: { display: true, text: '血糖值 (mg/dL)' }
        }
      }
    }
  });
}

// 病患選擇器（備用）
async function loadPatientSelector() {
  const grid = document.getElementById("patientGrid");
  grid.innerHTML = "<p>載入病患清單中...</p>";

  try {
    const bundle = await fhirClient.request("Patient?_count=8&_sort=-_lastUpdated");
    grid.innerHTML = "";

    bundle.entry?.forEach(entry => {
      const p = entry.resource;
      const name = p.name?.[0]?.text || p.name?.[0]?.family || "未知病患";
      
      const card = document.createElement("div");
      card.className = "card patient-selector-card";
      card.innerHTML = `
        <h3>${name}</h3>
        <p>性別：${p.gender || '未提供'} | 出生：${p.birthDate || '未知'}</p>
        <button class="btn-action" onclick="selectPatient('${p.id}')">進入藥物安全監測</button>
      `;
      grid.appendChild(card);
    });
  } catch (e) {
    grid.innerHTML = `<p style="color:#ef4444">無法載入病患清單</p>`;
    console.error(e);
  }
}

function selectPatient(patientId) {
  loadMonitoringView(patientId);
}

function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
}

function backToSelector() {
  showView("selectorView");
}

// 頁面載入時執行
window.onload = () => {
  if (window.location.search.includes("code=")) {
    initializeSMART();
  } else {
    document.getElementById("currentPatientInfo").innerHTML = "Standalone 模式 - 請選擇病患";
    showView("selectorView");
  }
};
</script>

</body>
</html>
